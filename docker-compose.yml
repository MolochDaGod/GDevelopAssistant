version: '3.8'

# NOTE: MongoDB and Redis have been removed.
# - Database: Neon PostgreSQL (serverless, via DATABASE_URL)
# - Client cache: Puter KV (client-side, no server needed)
# - File storage: Puter FS (client-side cloud storage)

services:
  # AI Agents Service
  ai-agents:
    build: .
    container_name: grudgedot-ai-agents
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AI_AGENT_PORT=3001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_AGENT_MODEL=gpt-4
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3001:3001"
    networks:
      - grudgedot-network
    command: node src/ai-agents/index.js

  # Game Server Service (legacy Socket.IO)
  game-server:
    build: .
    container_name: grudgedot-game-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - GAME_SERVER_PORT=3002
      - GAME_SERVER_MAX_PLAYERS=100
      - GAME_SERVER_TICK_RATE=60
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3002:3002"
    networks:
      - grudgedot-network
    command: node src/game-server/index.js

  # Colyseus Game Server (WCS rooms: lobby, gruda-wars, rts-battle)
  colyseus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grudge-colyseus
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - COLYSEUS_PORT=2567
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "2567:2567"
    networks:
      - grudgedot-network
    command: node dist/server/colyseus/index.js
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2567/colyseus/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Main Application
  app:
    build: .
    container_name: grudgedot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    networks:
      - grudgedot-network
    volumes:
      - ./src:/app/src

networks:
  grudgedot-network:
    driver: bridge
